<!DOCTYPE html>
<html lang="en">
    <head>
        <title>img2html</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" href="./favicon.svg" type="image/svg+xml">
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>

    <body>
        <form enctype="multipart/form-data" id="image-form" method="post">
            <input accept="image/*" id="image-input" type="file" />
            <input id="image-upload" type="submit" value="Load" />
            <p class="image-error"></p>
        </form>

        <div class="wrapper">
            <img id="image-value" />

            <form id="pixel-width-form">
                <label>Pixel Width</label>
                <input type="number" id="pixel-width" value="1" min="1" step="1" />
                <input type="submit" value="Submit" />
            </form>

            <div id="result"></div>
        </div>
    </body>
</html>
